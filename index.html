<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breaking News</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E8342A;--red-l:#FFF0EF;--red-m:#FFDAD7;
  --amber:#F59E0B;--amber-l:#FFFBEB;--amber-m:#FEF3C7;
  --blue:#3B82F6;--blue-l:#EFF6FF;--blue-m:#DBEAFE;
  --purple:#8B5CF6;--purple-l:#F5F3FF;--purple-m:#EDE9FE;
  --green:#10B981;--green-l:#ECFDF5;--green-m:#D1FAE5;
  --orange:#F97316;--orange-l:#FFF7ED;--orange-m:#FFEDD5;
  --slate:#64748B;--slate-m:#E2E8F0;--slate-l:#F8FAFC;
  --ink:#0F172A;--muted:#475569;--hint:#94A3B8;
  --bg:#F0F4F8;--card:#fff;--border:#E2E8F0;
  --r:16px;--rs:10px;
  --s0:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --s1:0 4px 16px rgba(0,0,0,.09),0 2px 6px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* ── BOOT ── */
#boot{position:fixed;inset:0;background:var(--ink);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;transition:opacity .5s}
#boot.out{opacity:0;pointer-events:none}
.b-logo{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:#fff;letter-spacing:-1.5px;display:flex;align-items:center;gap:10px}
.b-dot{width:10px;height:10px;background:var(--red);border-radius:50%;animation:pdot 1.4s ease-in-out infinite}
@keyframes pdot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}}
.b-logo em{color:var(--red);font-style:normal}
.b-wrap{width:280px}
.b-track{height:2px;background:rgba(255,255,255,.1);border-radius:1px;overflow:hidden;margin-bottom:12px}
.b-fill{height:100%;background:var(--red);width:0%;transition:width .4s ease}
.b-msg{font-size:13px;color:#64748B;text-align:center;height:20px}
.b-steps{display:flex;gap:24px}
.b-step{display:flex;align-items:center;gap:6px;font-size:12px;color:#334155;transition:color .3s}
.b-step.on{color:#94A3B8}.b-step.ok{color:#34D399}
.b-si{font-size:14px;width:16px;text-align:center}

/* ── HEADER ── */
.hdr{background:var(--ink);position:sticky;top:0;z-index:200}
.hdr-in{max-width:1260px;margin:0 auto;padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-dot{width:8px;height:8px;background:var(--red);border-radius:50%;animation:pdot 1.6s ease-in-out infinite}
.logo-txt{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#fff;letter-spacing:-.5px}
.logo-txt em{color:var(--red);font-style:normal}
.hdr-mid{display:flex;align-items:center;gap:10px}
.mpill{display:flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;font-size:11px;color:#94A3B8;white-space:nowrap}
.mpill strong{color:#CBD5E1;font-weight:500}
.hdr-btns{display:flex;align-items:center;gap:7px}
.vdiv{width:1px;height:22px;background:rgba(255,255,255,.1)}
.ibtn{display:inline-flex;align-items:center;gap:7px;padding:7px 15px;border-radius:9px;border:1px solid;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background .2s,opacity .2s;white-space:nowrap}
.ibtn:disabled{opacity:.35;cursor:not-allowed}
.ibtn svg{width:16px;height:16px;flex-shrink:0}
.ibtn-r{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.14);color:#CBD5E1}
.ibtn-r:hover:not(:disabled){background:rgba(255,255,255,.12)}
.ibtn-q{background:rgba(20,184,166,.08);border-color:rgba(20,184,166,.3);color:#5EEAD4}
.ibtn-q:hover:not(:disabled){background:rgba(20,184,166,.14)}
.ibtn-f{background:rgba(139,92,246,.08);border-color:rgba(139,92,246,.3);color:#C4B5FD}
.ibtn-f:hover:not(:disabled){background:rgba(139,92,246,.14)}
.ibtn-g{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);color:#64748B;padding:7px 10px}
.ibtn-g:hover:not(:disabled){background:rgba(255,255,255,.1);color:#94A3B8}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite}

/* ── MAIN ── */
.main{max-width:1260px;margin:0 auto;padding:28px 24px}

/* trending */
.tbar{display:flex;align-items:center;gap:8px;margin-bottom:28px;flex-wrap:wrap}
.tbar-lbl{font-size:10.5px;font-weight:600;color:var(--hint);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.ttag{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:transform .15s,box-shadow .15s;border:1px solid transparent;white-space:nowrap}
.ttag:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,0,0,.1)}
.ttag.act{outline:2px solid var(--ink);outline-offset:1px}
.cr{background:var(--red-l);color:var(--red);border-color:var(--red-m)}
.ca2{background:var(--amber-l);color:#B45309;border-color:var(--amber-m)}
.cb{background:var(--blue-l);color:#1D4ED8;border-color:var(--blue-m)}
.cp{background:var(--purple-l);color:var(--purple);border-color:var(--purple-m)}
.cg2{background:var(--green-l);color:#059669;border-color:var(--green-m)}
.co{background:var(--orange-l);color:var(--orange);border-color:var(--orange-m)}

/* section label */
.slbl{font-family:'Syne',sans-serif;font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--hint);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.slbl::after{content:'';flex:1;height:1px;background:var(--border)}

/* top3 */
.t3{display:grid;grid-template-columns:1.55fr 1fr;grid-template-rows:auto auto;gap:14px;margin-bottom:36px}
.t3>:first-child{grid-row:1/3}

/* cards */
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:18px 20px;box-shadow:var(--s0);transition:transform .2s,box-shadow .2s;animation:fu .35s ease both}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card:hover{transform:translateY(-2px);box-shadow:var(--s1)}
.card.hero{padding:24px 26px;border-left:4px solid var(--red)}
.card.hero .ctit{font-size:17px;line-height:1.4}
.card.hero .csum{font-size:14px}
.chdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:11px}
.ctit{font-size:14px;font-weight:600;line-height:1.5;color:var(--ink);flex:1;letter-spacing:-.01em}
.ibadge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:6px;font-size:10.5px;font-weight:600;white-space:nowrap;flex-shrink:0}
.ihi{background:var(--red-l);color:var(--red)}
.imd{background:var(--amber-l);color:#B45309}
.ilo{background:var(--slate-m);color:var(--slate)}
.csum{font-size:13px;line-height:1.72;color:var(--muted);margin-bottom:11px}
.cwhy{background:var(--blue-l);border-left:3px solid var(--blue);padding:8px 12px;border-radius:0 8px 8px 0;margin-bottom:13px}
.cwhy-l{font-size:9.5px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.cwhy-t{font-size:12.5px;color:#1E40AF;line-height:1.55;font-style:italic}
.cftr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.cmeta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.stag{font-size:11px;font-weight:600;color:var(--hint);background:var(--slate-m);padding:2px 8px;border-radius:5px}
.cattag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em}
.ptime{font-size:11px;color:var(--hint)}
.sbtn{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;background:var(--ink);color:#fff;border-radius:7px;font-size:12px;font-weight:500;text-decoration:none;transition:opacity .15s}
.sbtn:hover{opacity:.72}
.sbtn svg{width:11px;height:11px;opacity:.7}

/* tabs */
.tbwrap{margin-bottom:20px}
.tabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:4px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:7px;font-size:13px;font-weight:500;color:var(--muted);border:none;background:transparent;cursor:pointer;white-space:nowrap;transition:all .18s}
.tab:hover{color:var(--ink);background:var(--slate-m)}
.tab.on{background:var(--ink);color:#fff}
.tcnt{font-size:11px;background:rgba(0,0,0,.07);padding:1px 6px;border-radius:10px}
.tab.on .tcnt{background:rgba(255,255,255,.18)}

/* layout */
.lay{display:grid;grid-template-columns:1fr 272px;gap:22px;align-items:start}
.ngrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(308px,1fr));gap:13px}

/* sidebar */
.side{position:sticky;top:68px;display:flex;flex-direction:column;gap:14px}
.sc{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:18px 20px;box-shadow:var(--s0)}
.sc-tit{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:14px}
.tri{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.tri:last-child{border:none;padding-bottom:0}
.tri-i{font-size:15px;flex-shrink:0;margin-top:1px}
.tri-b{font-size:12.5px;color:var(--muted);line-height:1.55}
.tri-b strong{color:var(--ink);font-weight:500;display:block;margin-bottom:2px;font-size:13px}
.tcloud{display:flex;flex-wrap:wrap;gap:6px}
.tpill{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:transform .12s}
.tpill:hover{transform:translateY(-1px)}

/* skeleton */
.skc{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:20px}
.sk{background:linear-gradient(90deg,#EEF2F7 25%,#E4EAF2 50%,#EEF2F7 75%);background-size:200% 100%;animation:shim 1.5s infinite;border-radius:6px}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk1{height:17px;width:88%;margin-bottom:8px}
.sk2{height:17px;width:62%;margin-bottom:14px}
.skl{height:13px;width:100%;margin-bottom:6px}
.skls{height:13px;width:72%;margin-bottom:16px}
.skb{height:26px;width:90px;border-radius:7px}

/* state */
.sbox{text-align:center;padding:56px 20px;grid-column:1/-1}
.sbox .ico{font-size:38px;margin-bottom:12px}
.sbox h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:6px}
.sbox p{font-size:14px;color:var(--muted);margin-bottom:16px}
.sbtn2{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;background:var(--ink);color:#fff;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s}
.sbtn2:hover{opacity:.8}

/* banner */
.banner{display:none;align-items:center;gap:10px;padding:10px 16px;background:var(--green-l);border:1px solid var(--green-m);border-radius:10px;margin-bottom:22px;font-size:13px;color:#065F46}
.banner.show{display:flex}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:11px 22px;border-radius:30px;font-size:13px;font-weight:500;z-index:1000;transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .35s;opacity:0;white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.25)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* modal */
.mbg{display:none;position:fixed;inset:0;background:rgba(15,23,42,.72);z-index:800;align-items:center;justify-content:center;padding:20px}
.mbg.open{display:flex}
.mbox{background:var(--card);border-radius:20px;padding:32px;max-width:460px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.28);position:relative}
.mx{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--slate-l);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:background .15s,color .15s}
.mx:hover{background:var(--slate-m);color:var(--ink)}
.mtit{font-size:20px;font-weight:800;color:var(--ink);margin-bottom:6px;padding-right:32px;line-height:1.3}
.mtit .gs{font-family:'Playfair Display',serif;font-weight:700;font-size:21px}
.msub{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.6}
.mfl{margin-bottom:14px}
.mfl label{display:block;font-size:11px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.mfl input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .2s}
.mfl input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.mfl input::placeholder{color:var(--hint)}
.mfree{font-size:11.5px;color:#059669;background:var(--green-l);border:1px solid var(--green-m);border-radius:7px;padding:8px 12px;margin:14px 0 0;display:flex;align-items:center;gap:6px}
.macts{display:flex;gap:10px;margin-top:20px}
.mbp{flex:1;padding:11px;background:var(--ink);color:#fff;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
.mbp:hover{opacity:.82}
.mbs{padding:11px 18px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
.mbs:hover{background:var(--slate-l)}

@media(max-width:960px){.lay{grid-template-columns:1fr}.side{position:static}.t3{grid-template-columns:1fr;grid-template-rows:auto}.t3>:first-child{grid-row:auto}.hdr-mid{display:none}}
@media(max-width:620px){.main{padding:18px 14px}.ngrid{grid-template-columns:1fr}.hdr-in{padding:0 14px}.ibtn span{display:none}.ibtn{padding:7px 9px}.ibtn-g{display:none}}
</style>
</head>
<body>

<div id="boot">
  <div class="b-logo"><div class="b-dot"></div>BREAKING<em>NEWS</em></div>
  <div class="b-wrap">
    <div class="b-track"><div class="b-fill" id="bf"></div></div>
    <div class="b-msg" id="bm">初始化…</div>
  </div>
  <div class="b-steps">
    <div class="b-step" id="bs1"><div class="b-si">○</div>讀取快取</div>
    <div class="b-step" id="bs2"><div class="b-si">○</div>同步資料</div>
    <div class="b-step" id="bs3"><div class="b-si">○</div>渲染頁面</div>
  </div>
</div>

<div class="mbg" id="modal">
  <div class="mbox">
    <button class="mx" onclick="closeM()">✕</button>
    <div class="mtit">⚙️ 連接 <span class="gs">Google Sheet</span></div>
    <p class="msub">貼上 Apps Script Web App URL，網頁透過它讀寫新聞快取。</p>
    <div class="mfl">
      <label>Apps Script Web App URL</label>
      <input type="url" id="gasIn" placeholder="https://script.google.com/macros/s/…/exec" autocomplete="off"/>
    </div>
    <div class="mfree">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      完全免費，不需要任何 API Key
    </div>
    <div class="macts">
      <button class="mbp" onclick="saveM()">儲存並連接</button>
      <button class="mbs" onclick="closeM()">略過</button>
    </div>
  </div>
</div>

<header class="hdr">
  <div class="hdr-in">
    <a class="logo" href="#"><div class="logo-dot"></div><div class="logo-txt">BREAKING<em>NEWS</em></div></a>
    <div class="hdr-mid">
      <div class="mpill" id="pUpd" style="display:none">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4" stroke="#94A3B8" stroke-width="1.2"/><path d="M5 2.5V5l1.5 1.5" stroke="#94A3B8" stroke-width="1.2" stroke-linecap="round"/></svg>
        最後更新 <strong id="tUpd">—</strong>
      </div>
      <div class="mpill" id="pSync" style="display:none">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M8.5 5A3.5 3.5 0 1 1 5 1.5" stroke="#94A3B8" stroke-width="1.2" stroke-linecap="round"/><path d="M6.5 1.5h2v2" stroke="#94A3B8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        最後同步 <strong id="tSync">—</strong>
      </div>
    </div>
    <div class="hdr-btns">
      <button class="ibtn ibtn-r" id="btnR" onclick="doReload()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-5.1"/></svg>
        <span>Reload</span>
      </button>
      <div class="vdiv"></div>
      <button class="ibtn ibtn-q" id="btnQ" onclick="doRefresh('quick')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <span>Quick</span>
      </button>
      <button class="ibtn ibtn-f" id="btnF" onclick="doRefresh('full')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
        <span>Full</span>
      </button>
      <div class="vdiv"></div>
      <button class="ibtn ibtn-g" onclick="openM()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>
</header>

<main class="main" id="main" style="display:none">
  <div class="banner" id="banner">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    <span id="bannerMsg">已載入</span>
  </div>
  <div class="tbar" id="tbar"><span class="tbar-lbl">熱門主題</span></div>
  <div>
    <div class="slbl">👑 今日重點 — Top 3 Headlines</div>
    <div class="t3" id="t3"></div>
  </div>
  <div class="lay">
    <div>
      <div class="tbwrap">
        <div class="tabs">
          <button class="tab on" data-c="all" onclick="sw(this,'all')">🌐 全部 <span class="tcnt" id="ca">—</span></button>
          <button class="tab" data-c="geo"      onclick="sw(this,'geo')">🌍 Geo <span class="tcnt" id="cg">—</span></button>
          <button class="tab" data-c="econ"     onclick="sw(this,'econ')">💰 Economy <span class="tcnt" id="ce">—</span></button>
          <button class="tab" data-c="conflict" onclick="sw(this,'conflict')">⚔️ Conflict <span class="tcnt" id="cc">—</span></button>
          <button class="tab" data-c="tech"     onclick="sw(this,'tech')">🧠 Tech/AI <span class="tcnt" id="ct">—</span></button>
          <button class="tab" data-c="macro"    onclick="sw(this,'macro')">📊 Macro <span class="tcnt" id="cm">—</span></button>
        </div>
      </div>
      <div class="ngrid" id="grid"></div>
    </div>
    <aside class="side">
      <div class="sc"><div class="sc-tit">📈 7天延續議題</div><div id="trends"></div></div>
      <div class="sc"><div class="sc-tit">🏷 主題標籤</div><div class="tcloud" id="tagcloud"></div></div>
    </aside>
  </div>
</main>
<div class="toast" id="toast"></div>

<script>
const K={GAS:'bn_gas',NEWS:'bn_news',UPD:'bn_upd',SYNC:'bn_sync'};
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
let NEWS=[],CAT='all',TAG=null;

/* modal */
function openM(){document.getElementById('gasIn').value=localStorage.getItem(K.GAS)||'';document.getElementById('modal').classList.add('open');}
function closeM(){document.getElementById('modal').classList.remove('open');}
function saveM(){
  const v=document.getElementById('gasIn').value.trim();
  if(!v.includes('script.google.com')){toast('⚠️ URL 格式不正確');return;}
  localStorage.setItem(K.GAS,v);closeM();
  toast('✅ 已儲存，開始抓取…');
  setTimeout(()=>doRefresh('full'),400);
}

/* time */
function now(){const d=new Date(),p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}
function setUpd(t){const s=t||now();localStorage.setItem(K.UPD,s);document.getElementById('tUpd').textContent=s;document.getElementById('pUpd').style.display='';}
function setSync(t){if(!t)return;localStorage.setItem(K.SYNC,t);document.getElementById('tSync').textContent=t;document.getElementById('pSync').style.display='';}

/* toast / banner */
function toast(msg,ms=3000){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),ms);}
function showBanner(msg){document.getElementById('bannerMsg').textContent=msg;const b=document.getElementById('banner');b.classList.add('show');setTimeout(()=>b.classList.remove('show'),5000);}

/* render */
const CM={geo:{bg:'#EFF6FF',c:'#1D4ED8',l:'🌍 Geo'},econ:{bg:'#FFFBEB',c:'#B45309',l:'💰 Economy'},conflict:{bg:'#FEF2F2',c:'#991B1B',l:'⚔️ Conflict'},tech:{bg:'#F5F3FF',c:'#6D28D9',l:'🧠 Tech/AI'},macro:{bg:'#ECFDF5',c:'#065F46',l:'📊 Macro'}};
const ctag=c=>{const m=CM[c]||{bg:'#F1F5F9',c:'#475569',l:'📰 News'};return`<span class="cattag" style="background:${m.bg};color:${m.c}">${m.l}</span>`;};
const badge=i=>i==='high'?'<span class="ibadge ihi">🔴 高影響</span>':i==='mid'?'<span class="ibadge imd">🟡 中影響</span>':'<span class="ibadge ilo">⚪ 低影響</span>';

function card(n,hero=false){return`<div class="card${hero?' hero':''}"><div class="chdr"><div class="ctit">${n.title_en||''}</div>${badge(n.impact)}</div><p class="csum">${n.summary_zh||''}</p><div class="cwhy"><div class="cwhy-l">Why it matters</div><div class="cwhy-t">${n.why_zh||''}</div></div><div class="cftr"><div class="cmeta"><span class="stag">${n.source||''}</span>${ctag(n.cat)}<span class="ptime">🕐 ${n.time||''}</span></div><a class="sbtn" href="${n.sourceUrl||'#'}" target="_blank" rel="noopener">Source <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 11L11 1M11 1H5M11 1v6"/></svg></a></div></div>`;}
function sk(h=false){return`<div class="skc${h?' card hero':''}"><div class="sk sk1"></div><div class="sk sk2"></div><div class="sk skl"></div><div class="sk skl"></div><div class="sk skls"></div><div class="sk skb"></div></div>`;}

function fil(){let l=NEWS;if(TAG)l=l.filter(n=>(n.tags||[]).includes(TAG));if(CAT!=='all')l=l.filter(n=>n.cat===CAT);return l;}
function counts(){
  document.getElementById('ca').textContent=NEWS.length;
  [['g','geo'],['e','econ'],['c','conflict'],['t','tech'],['m','macro']].forEach(([k,v])=>{const e=document.getElementById('c'+k);if(e)e.textContent=NEWS.filter(n=>n.cat===v).length;});
}
function rTop3(){const t=NEWS.filter(n=>n.top3).slice(0,3);document.getElementById('t3').innerHTML=t.length?t.map((n,i)=>card(n,i===0)).join(''):[sk(true),sk(),sk()].join('');}
function rGrid(){const g=document.getElementById('grid'),l=fil();if(!l.length){g.innerHTML='<div class="sbox"><div class="ico">🔍</div><h3>此分類暫無新聞</h3><p>試試切換頁籤或清除標籤篩選</p></div>';return;}g.innerHTML=l.map(n=>card(n)).join('');}
function rTbar(){const f={};NEWS.forEach(n=>(n.tags||[]).forEach(t=>{f[t]=(f[t]||0)+1;}));const top=Object.entries(f).sort((a,b)=>b[1]-a[1]).slice(0,7);const cls=['cr','ca2','cb','cp','cg2','co','ca2'],emo=['🔴','💰','🤖','🚀','📊','⚖️','🌊'];document.getElementById('tbar').innerHTML='<span class="tbar-lbl">熱門主題</span>'+top.map(([t],i)=>`<span class="ttag ${cls[i%cls.length]}${TAG===t?' act':''}" onclick="ftag('${t}')">${emo[i]} ${t}</span>`).join('');}
function rTags(){const f={};NEWS.forEach(n=>(n.tags||[]).forEach(t=>{f[t]=(f[t]||0)+1;}));const top=Object.entries(f).sort((a,b)=>b[1]-a[1]).slice(0,14);const cls=['cr','cb','ca2','cp','cg2','co'];document.getElementById('tagcloud').innerHTML=top.map(([t],i)=>`<span class="tpill ${cls[i%cls.length]}${TAG===t?' act':''}" onclick="ftag('${t}')">${t}</span>`).join('');}
function rTrends(){const D=[{i:'🔥',t:'中東衝突持續升溫',d:'霍爾木茲封鎖持續，談判陷僵局'},{i:'📉',t:'全球增長遭下修',d:'IMF警告能源衝擊拖累GDP'},{i:'🤖',t:'AI軍備競賽加速',d:'美中差距縮小，模型競爭激烈'},{i:'🚀',t:'北韓接連飛彈測試',d:'宣稱無限擴大核武庫'},{i:'⚖️',t:'貿易戰重塑供應鏈',d:'美中貿易跌30%，東協受益'}];document.getElementById('trends').innerHTML=D.map(d=>`<div class="tri"><span class="tri-i">${d.i}</span><div class="tri-b"><strong>${d.t}</strong>${d.d}</div></div>`).join('');}
function rAll(){rTop3();rGrid();rTbar();rTags();counts();}

/* tab / tag */
function sw(btn,c){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');CAT=c;rGrid();}
function ftag(t){TAG=(TAG===t)?null:t;CAT='all';document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));document.querySelector('[data-c="all"]').classList.add('on');rGrid();rTags();rTbar();}

/* lock */
function lock(v){['btnR','btnQ','btnF'].forEach(id=>{document.getElementById(id).disabled=v;});}
function spin(id,v){document.getElementById(id).querySelector('svg').classList.toggle('spin',v);}

/* boot steps */
function bstep(n,msg,pct){['bs1','bs2','bs3'].forEach((id,i)=>{const e=document.getElementById(id),ico=e.querySelector('.b-si');e.className='b-step'+(i<n-1?' ok':i===n-1?' on':'');ico.textContent=i<n-1?'✓':i===n-1?'●':'○';});document.getElementById('bm').textContent=msg;document.getElementById('bf').style.width=pct+'%';}

/* GAS */
function getGas(){return localStorage.getItem(K.GAS)||'';}
async function gasRead(){
  const url=getGas();if(!url)return null;
  try{
    // append timestamp to bust cache
    const r=await fetch(url+'?action=read&t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    return d;
  }catch(e){console.warn('gasRead:',e.message);return null;}
}
async function gasFetch(mode){
  const url=getGas();
  if(!url)throw new Error('請先設定 Apps Script URL');
  const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'fetch',mode})});
  if(!r.ok)throw new Error('GAS HTTP '+r.status);
  const d=await r.json();
  if(!d.ok)throw new Error(d.error||'GAS error');
  return d;
}

/* boot */
async function boot(){
  bstep(1,'檢查本地快取…',15);await sleep(180);
  const su=localStorage.getItem(K.UPD),ss=localStorage.getItem(K.SYNC);
  if(su){document.getElementById('tUpd').textContent=su;document.getElementById('pUpd').style.display='';}
  if(ss){document.getElementById('tSync').textContent=ss;document.getElementById('pSync').style.display='';}

  const gas=getGas();
  if(!gas){
    bstep(2,'尚未設定…',55);await sleep(180);
    const local=localStorage.getItem(K.NEWS);
    if(local){NEWS=JSON.parse(local);bstep(3,'渲染頁面…',88);await sleep(150);done();toast('ℹ️ 請點 ⚙️ 設定 Apps Script URL');setTimeout(openM,1400);}
    else{bstep(3,'等待設定…',88);await sleep(150);done();document.getElementById('grid').innerHTML='<div class="sbox"><div class="ico">⚙️</div><h3>尚未設定</h3><p>請設定 Apps Script URL 以載入新聞</p><button class="sbtn2" onclick="openM()">立即設定 →</button></div>';document.getElementById('t3').innerHTML=[sk(true),sk(),sk()].join('');setTimeout(openM,600);}
    return;
  }

  bstep(2,'讀取 Google Sheet 快取…',50);
  const sheet=await gasRead();
  if(sheet&&sheet.ok&&sheet.data&&sheet.data.length>0){
    NEWS=sheet.data;localStorage.setItem(K.NEWS,JSON.stringify(NEWS));setSync(sheet.syncedAt);
    bstep(3,'渲染頁面…',88);await sleep(150);done();showBanner(`✅ 已載入 ${NEWS.length} 則新聞`);
  }else{
    bstep(3,'快取為空，抓取 RSS…',88);await sleep(150);done(true);
  }
}
function done(auto=false){
  document.getElementById('bf').style.width='100%';
  const b=document.getElementById('boot');b.classList.add('out');
  document.getElementById('main').style.display='';
  setTimeout(()=>b.remove(),560);
  rAll();rTrends();
  if(auto)setTimeout(()=>doRefresh('full'),500);
}

/* reload */
async function doReload(){
  if(!getGas()){openM();return;}
  lock(true);spin('btnR',true);toast('🔄 從 Sheet 讀取快取…',99999);
  const sheet=await gasRead();
  if(sheet&&sheet.ok&&sheet.data&&sheet.data.length>0){
    NEWS=sheet.data;localStorage.setItem(K.NEWS,JSON.stringify(NEWS));setSync(sheet.syncedAt);rAll();
    toast(`✅ 已載入 ${NEWS.length} 則`);showBanner(`Reload 完成，共 ${NEWS.length} 則`);
  }else{toast('⚠️ Sheet 無資料，請先 Full refresh');}
  lock(false);spin('btnR',false);
}

/* refresh */
async function doRefresh(mode){
  if(!getGas()){openM();return;}
  lock(true);const bid=mode==='quick'?'btnQ':'btnF';spin(bid,true);
  if(mode==='full'){document.getElementById('t3').innerHTML=[sk(true),sk(),sk()].join('');document.getElementById('grid').innerHTML=Array(6).fill(sk()).join('');toast('🔁 Full：抓取 RSS 新聞中…',99999);}
  else toast('⚡ Quick：補入最新頭條…',99999);
  try{
    const res=await gasFetch(mode);
    NEWS=res.data;const n=now();setUpd(n);setSync(res.syncedAt||n);
    localStorage.setItem(K.NEWS,JSON.stringify(NEWS));rAll();
    toast(`✅ 已更新 ${NEWS.length} 則`);showBanner(`同步完成，共 ${NEWS.length} 則`);
  }catch(e){console.error(e);toast('⚠️ '+(e.message||'更新失敗'));rAll();}
  lock(false);spin(bid,false);
}

boot();
</script>
</body>
</html>
